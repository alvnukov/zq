name: Bug report
description: Report a reproducible defect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide a minimal reproducible case.
  - type: input
    id: version
    attributes:
      label: zq version
      placeholder: zq 1.4.2
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 14 arm64 / Ubuntu 24.04 x86_64 / Windows 2022
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command line
      render: bash
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input sample
      description: Minimal sample to reproduce
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
