name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    name: CI (Single Step)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CI
        env:
          ZQ_RUN_JQ_UPSTREAM: "1"
          GIT_TERMINAL_PROMPT: "0"
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq git musl-tools
          rustup target add x86_64-unknown-linux-musl

          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-targets --all-features --locked
          cargo test --locked --test hardcode_guard --test hardcode_guard_clusters --test jq_oracle_baseline
          cargo test --test jq_upstream -- --nocapture

          cargo build --release --locked
          cargo build --release --locked --target x86_64-unknown-linux-musl
          file target/x86_64-unknown-linux-musl/release/zq | grep -Eqi "statically linked|static-pie linked"

          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            lf="$(awk -F: '/^LF:/{sum += $2} END {print sum + 0}' lcov.info)"
            lh="$(awk -F: '/^LH:/{sum += $2} END {print sum + 0}' lcov.info)"
            pct="$(awk -v lh="$lh" -v lf="$lf" 'BEGIN { if (lf == 0) printf "0.00"; else printf "%.2f", (100*lh/lf) }')"
            color="$(awk -v p="$pct" 'BEGIN {
              if (p >= 90) print "brightgreen";
              else if (p >= 80) print "green";
              else if (p >= 70) print "yellowgreen";
              else if (p >= 60) print "yellow";
              else if (p >= 50) print "orange";
              else print "red";
            }')"
            mkdir -p .github/badges
            cat > .github/badges/coverage.json <<EOF
            {"schemaVersion":1,"label":"coverage","message":"${pct}%","color":"${color}"}
            EOF
            curl -fsSL "https://img.shields.io/badge/coverage-${pct}%25-${color}" \
              -o .github/badges/coverage.svg

            if ! git diff --quiet -- .github/badges/coverage.json .github/badges/coverage.svg; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add .github/badges/coverage.json .github/badges/coverage.svg
              git commit -m "chore: update coverage badge [skip ci]"
              git push origin HEAD:main
            fi
          fi
