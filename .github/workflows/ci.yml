name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features --locked

      - name: Hard Compatibility Tests
        run: cargo test --locked --test hardcode_guard --test hardcode_guard_clusters --test jq_oracle_baseline

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
          - os: macos-latest
            rust_target: ""
          - os: windows-latest
            rust_target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup musl toolchain (Linux static build)
        if: ${{ matrix.rust_target != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.rust_target }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (Linux static)
        if: ${{ matrix.rust_target != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          file "target/${{ matrix.rust_target }}/release/zq" | grep -Eqi "statically linked|static-pie linked"

      - name: Build release binary
        if: ${{ matrix.rust_target == '' }}
        run: cargo build --release --locked

  upstream-jq-suite:
    name: Upstream jq Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Ensure jq and git
        run: |
          sudo apt-get update
          sudo apt-get install -y jq git

      - name: Run upstream jq compatibility suite
        env:
          ZQ_RUN_JQ_UPSTREAM: "1"
          GIT_TERMINAL_PROMPT: "0"
        run: cargo test --test jq_upstream -- --nocapture

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Update coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          lf="$(awk -F: '/^LF:/{sum += $2} END {print sum + 0}' lcov.info)"
          lh="$(awk -F: '/^LH:/{sum += $2} END {print sum + 0}' lcov.info)"
          pct="$(awk -v lh="$lh" -v lf="$lf" 'BEGIN { if (lf == 0) printf "0.00"; else printf "%.2f", (100*lh/lf) }')"
          color="$(awk -v p="$pct" 'BEGIN {
            if (p >= 90) print "brightgreen";
            else if (p >= 80) print "green";
            else if (p >= 70) print "yellowgreen";
            else if (p >= 60) print "yellow";
            else if (p >= 50) print "orange";
            else print "red";
          }')"
          mkdir -p .github/badges
          cat > .github/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${pct}%","color":"${color}"}
          EOF
          curl -fsSL "https://img.shields.io/badge/coverage-${pct}%25-${color}" \
            -o .github/badges/coverage.svg

      - name: Commit coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges/coverage.json .github/badges/coverage.svg; then
            echo "Coverage badge is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json .github/badges/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push origin HEAD:main

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: lcov.info
          fail_ci_if_error: false
