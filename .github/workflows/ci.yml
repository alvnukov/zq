name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  RUST_TOOLCHAIN: "1.94.0"
  JQ_VERSION: "jq-1.7.1"
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_DENY_VERSION: "0.19.0"

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            target
          key: ${{ runner.os }}-cargo-lint-and-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-and-test-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        env:
          PAGER: "less"
          RUST_TEST_THREADS: "1"
          RUST_MIN_STACK: "33554432"
        run: cargo test --all-targets --all-features --locked

      - name: Hard Compatibility Tests
        env:
          PAGER: "less"
          RUST_TEST_THREADS: "1"
          RUST_MIN_STACK: "33554432"
        run: cargo test --locked --test hardcode_guard --test hardcode_guard_clusters --test jq_oracle_baseline

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

  upstream-jq-suite:
    name: Upstream jq Suite
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            target
          key: ${{ runner.os }}-cargo-upstream-jq-suite-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-upstream-jq-suite-
            ${{ runner.os }}-cargo-

      - name: Install jq 1.7.1
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          case "${RUNNER_OS}-$(uname -m)" in
            Linux-x86_64) asset="jq-linux-amd64" ;;
            Linux-aarch64|Linux-arm64) asset="jq-linux-arm64" ;;
            macOS-x86_64) asset="jq-macos-amd64" ;;
            macOS-arm64) asset="jq-macos-arm64" ;;
            *)
              echo "unsupported runner for ${JQ_VERSION}: ${RUNNER_OS}-$(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -fsSL "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/${asset}" \
            -o "$RUNNER_TEMP/bin/jq"
          chmod +x "$RUNNER_TEMP/bin/jq"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          test "$(jq --version)" = "${JQ_VERSION}"
          git --version
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run upstream jq compatibility suite
        env:
          ZQ_RUN_JQ_UPSTREAM: "1"
          ZQ_JQ_AUTO_CLONE: "1"
          ZQ_JQ_SUITES: "jq171"
          LC_ALL: "C"
          LANG: "C"
          TZ: "UTC"
          GIT_TERMINAL_PROMPT: "0"
        run: cargo test --test jq_upstream -- --nocapture

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        env:
          PAGER: "less"
          RUST_TEST_THREADS: "1"
          RUST_MIN_STACK: "33554432"
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Update coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          lf="$(awk -F: '/^LF:/{sum += $2} END {print sum + 0}' lcov.info)"
          lh="$(awk -F: '/^LH:/{sum += $2} END {print sum + 0}' lcov.info)"
          pct="$(awk -v lh="$lh" -v lf="$lf" 'BEGIN { if (lf == 0) printf "0.00"; else printf "%.2f", (100*lh/lf) }')"
          color="$(awk -v p="$pct" 'BEGIN {
            if (p >= 90) print "brightgreen";
            else if (p >= 80) print "green";
            else if (p >= 70) print "yellowgreen";
            else if (p >= 60) print "yellow";
            else if (p >= 50) print "orange";
            else print "red";
          }')"
          mkdir -p .github/badges
          cat > .github/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${pct}%","color":"${color}"}
          EOF
          curl -fsSL "https://img.shields.io/badge/coverage-${pct}%25-${color}" \
            -o .github/badges/coverage.svg

      - name: Commit coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges/coverage.json .github/badges/coverage.svg; then
            echo "Coverage badge is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json .github/badges/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push origin HEAD:main

      - name: Get Codecov OIDC token
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        id: codecov-oidc
        with:
          script: return await core.getIDToken('https://codecov.io')

      - name: Upload coverage to Codecov
        shell: bash
        env:
          CC_TOKEN: ${{ steps.codecov-oidc.outputs.result }}
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/codecov/codecov-action/671740ac38dd9b0130fbe1cec585b89eea48d3de/dist/codecov.sh \
            -o "$RUNNER_TEMP/codecov.sh"
          chmod +x "$RUNNER_TEMP/codecov.sh"
          CC_RUN_CMD=upload-coverage \
          CC_FAIL_ON_ERROR=false \
          CC_FILES=lcov.info \
          CC_GIT_SERVICE=github \
          "$RUNNER_TEMP/codecov.sh"

  security:
    name: Security Checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            target
          key: ${{ runner.os }}-cargo-security-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-security-
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit --version ${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny --version ${{ env.CARGO_DENY_VERSION }}

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny policy
        run: cargo deny check advisories bans sources
