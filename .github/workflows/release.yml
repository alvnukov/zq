name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    name: Build assets (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup musl toolchain (Linux static build)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify Linux binary is static
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          file "target/${{ matrix.target }}/release/zq" | grep -Eqi "statically linked|static-pie linked"

      - name: Install Linux package tooling
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cargo install cargo-deb cargo-generate-rpm --locked

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PKG_DIR="zq-${VERSION}-${{ matrix.target }}"
          mkdir -p "$PKG_DIR"
          cp "target/${{ matrix.target }}/release/zq" "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          if [ -f LICENSE ]; then cp LICENSE "$PKG_DIR/"; fi
          tar -czf "${PKG_DIR}.tar.gz" "$PKG_DIR"
          shasum -a 256 "${PKG_DIR}.tar.gz" > "${PKG_DIR}.tar.gz.sha256"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $PkgDir = "zq-$Version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $PkgDir | Out-Null
          $BinaryCandidates = @(
            "target/${{ matrix.target }}/release/zq.exe",
            "target/release/zq.exe"
          )
          $InputBin = $null
          foreach ($candidate in $BinaryCandidates) {
            if (Test-Path $candidate) {
              $InputBin = (Resolve-Path $candidate).Path
              break
            }
          }
          if (-not $InputBin) {
            throw "zq.exe is missing. Checked: $($BinaryCandidates -join ', ')"
          }
          Copy-Item $InputBin "$PkgDir/zq.exe"
          Copy-Item "README.md" "$PkgDir/README.md"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$PkgDir/LICENSE" }
          Compress-Archive -Path $PkgDir -DestinationPath "$PkgDir.zip"
          $hash = Get-FileHash "$PkgDir.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $PkgDir.zip" | Out-File -Encoding ascii "$PkgDir.zip.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            zq-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            zq-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

      - name: Build DEB and RPM packages (Linux)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/zq" "target/release/zq"
          cargo deb --no-build --target "${{ matrix.target }}" --output "zq-${VERSION}-${{ matrix.target }}.deb"
          cargo generate-rpm --target "${{ matrix.target }}" --output "zq-${VERSION}-${{ matrix.target }}.rpm"
          shasum -a 256 "zq-${VERSION}-${{ matrix.target }}.deb" > "zq-${VERSION}-${{ matrix.target }}.deb.sha256"
          shasum -a 256 "zq-${VERSION}-${{ matrix.target }}.rpm" > "zq-${VERSION}-${{ matrix.target }}.rpm.sha256"

      - name: Upload DEB and RPM artifacts (Linux)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-packages
          path: |
            zq-${{ github.ref_name }}-${{ matrix.target }}.deb
            zq-${{ github.ref_name }}-${{ matrix.target }}.deb.sha256
            zq-${{ github.ref_name }}-${{ matrix.target }}.rpm
            zq-${{ github.ref_name }}-${{ matrix.target }}.rpm.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  publish-homebrew-tap:
    name: Publish Homebrew Tap
    needs: publish-release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      HOMEBREW_TAP_FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
    steps:
      - name: Update tap formula
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Missing required secret HOMEBREW_TAP_TOKEN"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME}"
          TAP_REPO="${HOMEBREW_TAP_REPO:-${GITHUB_REPOSITORY_OWNER}/homebrew-tap}"
          FORMULA_PATH="${HOMEBREW_TAP_FORMULA_PATH:-Formula/zq.rb}"
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${VERSION}.tar.gz"

          curl -fsSL "$SOURCE_URL" -o zq-src.tar.gz
          SHA256="$(sha256sum zq-src.tar.gz | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          mkdir -p "$(dirname "$FORMULA_PATH")"

          cat > "$FORMULA_PATH" <<EOF
          class Zq < Formula
            desc "Standalone jq-compatible query engine with JSON/YAML input and JSON/YAML output"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            url "${SOURCE_URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"
            head "https://github.com/${GITHUB_REPOSITORY}.git", branch: "main"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args(path: ".")
            end

            test do
              (testpath/"in.json").write("{\\"a\\":1}")
              assert_equal "1", shell_output("#{bin}/zq -r '.a' < #{testpath}/in.json").strip
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$FORMULA_PATH"
          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            if git diff --cached --quiet -- "$FORMULA_PATH"; then
              echo "No tap changes detected in $FORMULA_PATH"
              exit 0
            fi
          fi
          git commit -m "zq ${VERSION}"
          git push origin HEAD
