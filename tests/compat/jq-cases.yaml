# Compatibility subset derived from jq project tests and jq language behavior:
# - https://github.com/jqlang/jq/tree/master/tests
# These are minimal portable cases used to guard happ jq semantics.

cases:
  - id: jq_identity
    query: "."
    input_json: '{"a":1,"b":[1,2,3]}'
    output_json_lines:
      - '{"a":1,"b":[1,2,3]}'

  - id: jq_field
    query: ".a"
    input_json: '{"a":1,"b":2}'
    output_json_lines:
      - "1"

  - id: jq_nested_field
    query: ".a.b"
    input_json: '{"a":{"b":3}}'
    output_json_lines:
      - "3"

  - id: jq_array_iter
    query: ".[]"
    input_json: '[1,2,3]'
    output_json_lines:
      - "1"
      - "2"
      - "3"

  - id: jq_length
    query: "length"
    input_json: '[10,20,30]'
    output_json_lines:
      - "3"

  - id: jq_keys
    query: "keys"
    input_json: '{"b":1,"a":2}'
    output_json_lines:
      - '["a","b"]'

  - id: jq_sort
    query: "sort"
    input_json: '[3,1,2]'
    output_json_lines:
      - "[1,2,3]"

  - id: jq_pipe_iter_field
    query: ".[] | .a"
    input_json: '[{"a":1},{"a":2}]'
    output_json_lines:
      - "1"
      - "2"

  - id: jq_map_field
    query: "map(.a)"
    input_json: '[{"a":1},{"a":2}]'
    output_json_lines:
      - "[1,2]"

  - id: jq_select_eq
    query: ".[] | select(.a == 2) | .a"
    input_json: '[{"a":1},{"a":2}]'
    output_json_lines:
      - "2"

  - id: jq_collect_stream
    query: "[.[] | .a]"
    input_json: '[{"a":1},{"a":2}]'
    output_json_lines:
      - "[1,2]"

  - id: jq_index_lookup
    query: ".[1]"
    input_json: '["x","y","z"]'
    output_json_lines:
      - '"y"'

  - id: jq_has_key
    query: 'has("a")'
    input_json: '{"a":1,"b":2}'
    output_json_lines:
      - "true"

  - id: jq_type
    query: "type"
    input_json: '{"a":1}'
    output_json_lines:
      - '"object"'

  - id: jq_tostring
    query: "tostring"
    input_json: "12"
    output_json_lines:
      - '"12"'

  - id: jq_add
    query: "add"
    input_json: '[1,2,3]'
    output_json_lines:
      - "6"

  - id: jq_negative_index_last
    query: ".[-1]"
    input_json: '[10,20]'
    output_json_lines:
      - "20"

  - id: jq_negative_index_wrap_issue2826
    query: ".[-3]"
    input_json: '[10,20]'
    output_json_lines:
      - "null"

  - id: jq_keys_context_lookup_issue2593
    query: ". as $o | keys[] | $o[.]"
    input_json: '["a","b"]'
    output_json_lines:
      - '"a"'
      - '"b"'

  - id: jq_keys_context_lookup_with_tmp_issue2593
    query: ". as $o | keys[] | . as $k | $o[$k]"
    input_json: '["a","b"]'
    output_json_lines:
      - '"a"'
      - '"b"'

  - id: jq_bracket_string_key_lookup
    query: '.["a-b"]'
    input_json: '{"a-b":42}'
    output_json_lines:
      - "42"

  - id: jq_nested_bracket_string_key_lookup
    query: '.root["a-b"]'
    input_json: '{"root":{"a-b":7}}'
    output_json_lines:
      - "7"

  - id: jq_optional_field
    query: ".missing?"
    input_json: '{"a":1}'
    output_json_lines:
      - "null"

  - id: jq_optional_iter_on_object
    query: ".[]?"
    input_json: '{"a":1}'
    output_json_lines: []

  - id: jq_select_gt
    query: ".[] | select(.a > 1) | .a"
    input_json: '[{"a":1},{"a":2},{"a":3}]'
    output_json_lines:
      - "2"
      - "3"

  - id: jq_select_and_or
    query: '.[] | select(.a > 1 and .name == "x" or .name == "z") | .a'
    input_json: '[{"a":1,"name":"x"},{"a":2,"name":"x"},{"a":3,"name":"y"},{"a":4,"name":"z"}]'
    output_json_lines:
      - "2"
      - "4"

  - id: jq_comma_operator
    query: ".a, .b"
    input_json: '{"a":1,"b":2}'
    output_json_lines:
      - "1"
      - "2"

  - id: jq_alt_operator
    query: ".a // .b"
    input_json: '{"a":null,"b":2}'
    output_json_lines:
      - "2"

  - id: jq_slice_operator
    query: ".[1:3]"
    input_json: "[10,20,30,40]"
    output_json_lines:
      - "[20,30]"

  - id: jq_field_slice_operator
    query: ".arr[1:3]"
    input_json: '{"arr":[1,2,3,4]}'
    output_json_lines:
      - "[2,3]"

  - id: jq_not_stage
    query: ".[] | not"
    input_json: "[true,false,null,1,\"\"]"
    output_json_lines:
      - "false"
      - "true"
      - "true"
      - "false"
      - "true"

  - id: jq_empty_stage
    query: ".[] | empty"
    input_json: "[1,2,3]"
    output_json_lines: []

  - id: jq_contains
    query: 'contains("bc")'
    input_json: '"abcd"'
    output_json_lines:
      - "true"

  - id: jq_startswith
    query: 'startswith("ab")'
    input_json: '"abcd"'
    output_json_lines:
      - "true"

  - id: jq_endswith
    query: 'endswith("cd")'
    input_json: '"abcd"'
    output_json_lines:
      - "true"

  - id: jq_outer_parentheses
    query: "(.a // .b)"
    input_json: '{"a":null,"b":2}'
    output_json_lines:
      - "2"

  - id: jq_parenthesized_predicate
    query: '.[] | select((.a > 1) and (.name == "x")) | .a'
    input_json: '[{"a":1,"name":"x"},{"a":2,"name":"x"},{"a":3,"name":"y"}]'
    output_json_lines:
      - "2"

  - id: jq_if_then_else
    query: '.[] | if .enabled then .name else "skip" end'
    input_json: '[{"enabled":true,"name":"a"},{"enabled":false,"name":"b"}]'
    output_json_lines:
      - '"a"'
      - '"skip"'

  - id: jq_nested_if_then_else
    query: 'if .a then (if .b then "x" else "y" end) else "z" end'
    input_json: '{"a":true,"b":false}'
    output_json_lines:
      - '"y"'

  - id: jq_values
    query: ".[] | values"
    input_json: "[1,null,2]"
    output_json_lines:
      - "1"
      - "2"

  - id: jq_tonumber
    query: '"42" | tonumber'
    input_json: "null"
    output_json_lines:
      - "42"

  - id: jq_split
    query: 'split(",")'
    input_json: '"a,b,c"'
    output_json_lines:
      - '["a","b","c"]'

  - id: jq_join
    query: 'join("-")'
    input_json: '["a","b","c"]'
    output_json_lines:
      - '"a-b-c"'

  - id: jq_reverse
    query: "reverse"
    input_json: "[1,2,3]"
    output_json_lines:
      - "[3,2,1]"

  - id: jq_min
    query: "min"
    input_json: "[3,1,2]"
    output_json_lines:
      - "1"

  - id: jq_max
    query: "max"
    input_json: "[3,1,2]"
    output_json_lines:
      - "3"

  - id: jq_add_numbers
    query: ".a + .b"
    input_json: '{"a":2,"b":3}'
    output_json_lines:
      - "5"

  - id: jq_sub_numbers
    query: ".a - .b"
    input_json: '{"a":7,"b":2}'
    output_json_lines:
      - "5"

  - id: jq_mul_numbers
    query: ".a * .b"
    input_json: '{"a":4,"b":3}'
    output_json_lines:
      - "12"

  - id: jq_div_numbers
    query: ".a / .b"
    input_json: '{"a":9,"b":2}'
    output_json_lines:
      - "4.5"

  - id: jq_add_strings
    query: ".a + .b"
    input_json: '{"a":"ab","b":"cd"}'
    output_json_lines:
      - '"abcd"'

  - id: jq_add_arrays
    query: ".a + .b"
    input_json: '{"a":[1,2],"b":[3]}'
    output_json_lines:
      - "[1,2,3]"

  - id: jq_add_objects
    query: ".a + .b"
    input_json: '{"a":{"x":1},"b":{"y":2}}'
    output_json_lines:
      - '{"x":1,"y":2}'

  - id: jq_index_string
    query: 'index("bc")'
    input_json: '"abcabc"'
    output_json_lines:
      - "1"

  - id: jq_rindex_string
    query: 'rindex("bc")'
    input_json: '"abcabc"'
    output_json_lines:
      - "4"

  - id: jq_index_array
    query: "index(2)"
    input_json: "[1,2,3,2]"
    output_json_lines:
      - "1"

  - id: jq_rindex_array
    query: "rindex(2)"
    input_json: "[1,2,3,2]"
    output_json_lines:
      - "3"
