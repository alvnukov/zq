# Compatibility subset derived from yq behavior and YAML processing tests:
# - https://github.com/mikefarah/yq/tree/master/acceptance_tests
# Used as stable behavioral contract for happ yq frontend.

cases:
  - id: yq_identity
    query: "."
    input_yaml: |
      a: 1
      b:
        - 1
        - 2
    output_json_lines:
      - '{"a":1,"b":[1,2]}'

  - id: yq_field
    query: ".a"
    input_yaml: |
      a: 7
      b: 2
    output_json_lines:
      - "7"

  - id: yq_array_iter
    query: ".[]"
    input_yaml: |
      - red
      - green
      - blue
    output_json_lines:
      - '"red"'
      - '"green"'
      - '"blue"'

  - id: yq_length
    query: "length"
    input_yaml: |
      x: 1
      y: 2
    output_json_lines:
      - "2"

  - id: yq_keys
    query: "keys"
    input_yaml: |
      z: 1
      a: 2
    output_json_lines:
      - '["a","z"]'

  - id: yq_pipe_iter_field
    query: ".[] | .name"
    input_yaml: |
      - name: one
      - name: two
    output_json_lines:
      - '"one"'
      - '"two"'

  - id: yq_map_field
    query: "map(.name)"
    input_yaml: |
      - name: one
      - name: two
    output_json_lines:
      - '["one","two"]'

  - id: yq_select_eq
    query: ".[] | select(.name == \"two\") | .name"
    input_yaml: |
      - name: one
      - name: two
    output_json_lines:
      - '"two"'

  - id: yq_index_lookup
    query: ".[2]"
    input_yaml: |
      - a
      - b
      - c
    output_json_lines:
      - '"c"'

  - id: yq_has_key
    query: 'has("name")'
    input_yaml: |
      name: app
      replicas: 2
    output_json_lines:
      - "true"

  - id: yq_keys_context_lookup_issue2593
    query: ". as $o | keys[] | $o[.]"
    input_yaml: |
      - a
      - b
    output_json_lines:
      - '"a"'
      - '"b"'

  - id: yq_negative_index_last
    query: ".[-1]"
    input_yaml: |
      - 10
      - 20
    output_json_lines:
      - "20"

  - id: yq_negative_index_wrap_issue2826
    query: ".[-3]"
    input_yaml: |
      - 10
      - 20
    output_json_lines:
      - "null"

  - id: yq_bracket_string_key_lookup
    query: '.["a-b"]'
    input_yaml: |
      a-b: 42
    output_json_lines:
      - "42"

  - id: yq_nested_bracket_string_key_lookup
    query: '.root["a-b"]'
    input_yaml: |
      root:
        a-b: 7
    output_json_lines:
      - "7"

  - id: yq_optional_field
    query: ".missing?"
    input_yaml: |
      a: 1
    output_json_lines:
      - "null"

  - id: yq_optional_iter_on_object
    query: ".[]?"
    input_yaml: |
      a: 1
    output_json_lines: []

  - id: yq_select_gt
    query: ".[] | select(.a > 1) | .a"
    input_yaml: |
      - a: 1
      - a: 2
      - a: 3
    output_json_lines:
      - "2"
      - "3"

  - id: yq_select_and_or
    query: '.[] | select(.a > 1 and .name == "x" or .name == "z") | .a'
    input_yaml: |
      - a: 1
        name: x
      - a: 2
        name: x
      - a: 3
        name: y
      - a: 4
        name: z
    output_json_lines:
      - "2"
      - "4"

  - id: yq_comma_operator
    query: ".a, .b"
    input_yaml: |
      a: 1
      b: 2
    output_json_lines:
      - "1"
      - "2"

  - id: yq_alt_operator
    query: ".a // .b"
    input_yaml: |
      a: null
      b: 2
    output_json_lines:
      - "2"

  - id: yq_slice_operator
    query: ".[1:3]"
    input_yaml: |
      - 10
      - 20
      - 30
      - 40
    output_json_lines:
      - "[20,30]"

  - id: yq_field_slice_operator
    query: ".arr[1:3]"
    input_yaml: |
      arr:
        - 1
        - 2
        - 3
        - 4
    output_json_lines:
      - "[2,3]"

  - id: yq_not_stage
    query: ".[] | not"
    input_yaml: |
      - true
      - false
      - null
      - 1
      - ""
    output_json_lines:
      - "false"
      - "true"
      - "true"
      - "false"
      - "true"

  - id: yq_empty_stage
    query: ".[] | empty"
    input_yaml: |
      - 1
      - 2
      - 3
    output_json_lines: []

  - id: yq_contains
    query: 'contains("bc")'
    input_yaml: '"abcd"'
    output_json_lines:
      - "true"

  - id: yq_startswith
    query: 'startswith("ab")'
    input_yaml: '"abcd"'
    output_json_lines:
      - "true"

  - id: yq_endswith
    query: 'endswith("cd")'
    input_yaml: '"abcd"'
    output_json_lines:
      - "true"

  - id: yq_outer_parentheses
    query: "(.a // .b)"
    input_yaml: |
      a: null
      b: 2
    output_json_lines:
      - "2"

  - id: yq_parenthesized_predicate
    query: '.[] | select((.a > 1) and (.name == "x")) | .a'
    input_yaml: |
      - a: 1
        name: x
      - a: 2
        name: x
      - a: 3
        name: y
    output_json_lines:
      - "2"

  - id: yq_if_then_else
    query: '.[] | if .enabled then .name else "skip" end'
    input_yaml: |
      - enabled: true
        name: a
      - enabled: false
        name: b
    output_json_lines:
      - '"a"'
      - '"skip"'

  - id: yq_nested_if_then_else
    query: 'if .a then (if .b then "x" else "y" end) else "z" end'
    input_yaml: |
      a: true
      b: false
    output_json_lines:
      - '"y"'

  - id: yq_values
    query: ".[] | values"
    input_yaml: |
      - 1
      - null
      - 2
    output_json_lines:
      - "1"
      - "2"

  - id: yq_tonumber
    query: '"42" | tonumber'
    input_yaml: "null"
    output_json_lines:
      - "42"

  - id: yq_split
    query: 'split(",")'
    input_yaml: '"a,b,c"'
    output_json_lines:
      - '["a","b","c"]'

  - id: yq_join
    query: 'join("-")'
    input_yaml: |
      - a
      - b
      - c
    output_json_lines:
      - '"a-b-c"'

  - id: yq_reverse
    query: "reverse"
    input_yaml: |
      - 1
      - 2
      - 3
    output_json_lines:
      - "[3,2,1]"

  - id: yq_min
    query: "min"
    input_yaml: |
      - 3
      - 1
      - 2
    output_json_lines:
      - "1"

  - id: yq_max
    query: "max"
    input_yaml: |
      - 3
      - 1
      - 2
    output_json_lines:
      - "3"

  - id: yq_add_numbers
    query: ".a + .b"
    input_yaml: |
      a: 2
      b: 3
    output_json_lines:
      - "5"

  - id: yq_sub_numbers
    query: ".a - .b"
    input_yaml: |
      a: 7
      b: 2
    output_json_lines:
      - "5"

  - id: yq_mul_numbers
    query: ".a * .b"
    input_yaml: |
      a: 4
      b: 3
    output_json_lines:
      - "12"

  - id: yq_div_numbers
    query: ".a / .b"
    input_yaml: |
      a: 9
      b: 2
    output_json_lines:
      - "4.5"

  - id: yq_add_strings
    query: ".a + .b"
    input_yaml: |
      a: ab
      b: cd
    output_json_lines:
      - '"abcd"'

  - id: yq_add_arrays
    query: ".a + .b"
    input_yaml: |
      a:
        - 1
        - 2
      b:
        - 3
    output_json_lines:
      - "[1,2,3]"

  - id: yq_add_objects
    query: ".a + .b"
    input_yaml: |
      a:
        x: 1
      b:
        y: 2
    output_json_lines:
      - '{"x":1,"y":2}'

  - id: yq_index_string
    query: 'index("bc")'
    input_yaml: '"abcabc"'
    output_json_lines:
      - "1"

  - id: yq_rindex_string
    query: 'rindex("bc")'
    input_yaml: '"abcabc"'
    output_json_lines:
      - "4"

  - id: yq_index_array
    query: "index(2)"
    input_yaml: |
      - 1
      - 2
      - 3
      - 2
    output_json_lines:
      - "1"

  - id: yq_rindex_array
    query: "rindex(2)"
    input_yaml: |
      - 1
      - 2
      - 3
      - 2
    output_json_lines:
      - "3"

  - id: yq_anchor_merge_single
    query: ".svc"
    input_yaml: |
      base: &base
        name: app
        port: 8080
      svc:
        <<: *base
        port: 9090
    output_json_lines:
      - '{"name":"app","port":9090}'

  - id: yq_anchor_merge_sequence
    query: ".svc"
    input_yaml: |
      base1: &base1
        a: 1
        b: 1
      base2: &base2
        b: 2
        c: 2
      svc:
        <<: [*base1, *base2]
        c: 3
    output_json_lines:
      - '{"a":1,"b":1,"c":3}'

  - id: yq_anchor_merge_inline_flow_map_order
    query: ".obj"
    input_yaml: |
      base: &base
        dummy: 42
      obj:
        <<: { foo: 123, bar: 456 }
        baz: 999
    output_json_lines:
      - '{"foo":123,"bar":456,"baz":999}'
