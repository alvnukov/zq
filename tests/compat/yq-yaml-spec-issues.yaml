# YAML spec + yq issue-driven regression set.
# Sources:
# - YAML 1.2.2 mapping/anchors/aliases semantics
# - yq open issues (anchor/merge/order/comments/parser errors)

cases:
  - id: spec_merge_single_map
    query: ".svc"
    input_yaml: |
      base: &base
        name: app
        port: 8080
      svc:
        <<: *base
        port: 9090
    output_json_lines:
      - '{"name":"app","port":9090}'

  - id: spec_merge_sequence_precedence
    query: ".svc"
    input_yaml: |
      base1: &base1
        x: 1
        y: one
      base2: &base2
        y: two
        z: 3
      svc:
        <<: [*base1, *base2]
    output_json_lines:
      - '{"x":1,"y":"one","z":3}'

  - id: spec_merge_local_override
    query: ".svc"
    input_yaml: |
      base: &base
        image: nginx
        replicas: 1
      svc:
        <<: *base
        replicas: 2
    output_json_lines:
      - '{"image":"nginx","replicas":2}'

  - id: spec_merge_inline_flow_map_order
    query: ".obj"
    input_yaml: |
      base: &base
        dummy: 42
      obj:
        <<: { foo: 123, bar: 456 }
        baz: 999
    output_json_lines:
      - '{"foo":123,"bar":456,"baz":999}'

  - id: spec_quoted_merge_key_is_regular_key
    query: ".obj"
    input_yaml: |
      obj:
        "<<": { foo: 1 }
        baz: 2
    output_json_lines:
      - '{"<<":{"foo":1},"baz":2}'

  - id: issue_2593_keys_iteration_keeps_all_items
    query: ". as $o | keys[] | $o[.]"
    input_yaml: |
      alpha: 1
      beta: 2
      gamma: 3
    output_json_lines:
      - "1"
      - "2"
      - "3"

  - id: parser_duplicate_keys_must_error_issue_2228
    query: "."
    input_yaml: |
      a: 1
      a: 2
    error_contains: "duplicate"

  - id: parser_unknown_alias_must_error
    query: ".obj"
    input_yaml: |
      obj:
        <<: *missing
    error_contains: "unknown anchor"

  - id: parser_cycle_anchor_must_error_issue_2040
    query: "."
    input_yaml: |
      a: &a
        self: *a
    error_contains: "recursion limit"

  - id: parser_helm_template_must_error_issue_2270
    query: "."
    input_yaml: |
      key: {{ aaa }}:{{ bbb }}
    error_contains: "did not find expected key"

  - id: anchor_name_with_dash_underscore
    query: ".svc"
    input_yaml: |
      base: &A-B_C9
        name: svc
      svc:
        <<: *A-B_C9
        port: 80
    output_json_lines:
      - '{"name":"svc","port":80}'

  - id: mapping_order_in_plain_object_is_preserved
    query: ".obj"
    input_yaml: |
      obj:
        first: 1
        second: 2
        third: 3
    output_json_lines:
      - '{"first":1,"second":2,"third":3}'

  - id: merge_empty_sequence_no_effect_issue_2224_shape
    query: ".obj"
    input_yaml: |
      obj:
        <<: []
        a: 1
        b: 2
    output_json_lines:
      - '{"a":1,"b":2}'

  - id: merge_with_nested_map_keeps_nested_order
    query: ".obj"
    input_yaml: |
      base: &base
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
      obj:
        <<: *base
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
    output_json_lines:
      - '{"resources":{"requests":{"cpu":"200m","memory":"256Mi"}}}'

  - id: block_scalar_preserves_leading_blank_line_issue_1093_shape
    query: ".text"
    input_yaml: |
      text: |-

        line1
        line2
    output_json_lines:
      - '"\nline1\nline2"'

  - id: folded_scalar_basic
    query: ".text"
    input_yaml: |
      text: >-
        line1
        line2
    output_json_lines:
      - '"line1 line2"'

  - id: block_scalar_trailing_spaces_preserved_issue_566_shape
    query: ".text"
    input_yaml: |
      text: |-
        line1  
        line2
    output_json_lines:
      - '"line1  \nline2"'

  - id: complex_key_lookup_bracket_form_issue_2403_shape
    query: '.["a:b"]'
    input_yaml: |
      a:b: 42
    output_json_lines:
      - "42"

  - id: key_with_asterisk_lookup_issue_1323_shape
    query: '.["a*b"]'
    input_yaml: |
      "a*b": 7
    output_json_lines:
      - "7"

  - id: optional_field_on_missing_returns_null
    query: ".missing?"
    input_yaml: |
      a: 1
    output_json_lines:
      - "null"

  - id: optional_iter_on_mapping_returns_empty_stream
    query: ".[]?"
    input_yaml: |
      a: 1
      b: 2
    output_json_lines: []

  - id: multi_document_stream_currently_rejected
    query: ".a"
    input_yaml: |
      a: 1
      ---
      a: 2
    error_contains: "more than one document"
